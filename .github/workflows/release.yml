name: Create Release
on:
  release:
    types: [published]
jobs:
  package-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package source
        run: zip -r xcratcher-src.zip src requirements.txt README.md LICENCE -x "*__pycache__*"
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: xcratcher-src.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
